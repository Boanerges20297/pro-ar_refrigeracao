{% extends "base.html" %}
{% block title %}Novo Equipamento - Pronto Ar{% endblock %}
{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Adicionar Equipamento</h2>
</div>

<div class="bg-white shadow overflow-hidden sm:rounded-lg max-w-2xl mx-auto p-6">
    <form method="POST" action="{{ url_for('equipment.add') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="grid grid-cols-1 gap-6">

            <div>
                <label for="client_id" class="block text-sm font-medium text-gray-700">Cliente Proprietário *</label>
                <select id="client_id" name="client_id" required class="mt-1 block w-full bg-white border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    <option value="" disabled selected>Selecione um cliente...</option>
                    {% for client in clients %}
                        <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
                {% if not clients %}
                <p class="text-xs text-red-500 mt-1">Atenção: Você precisa cadastrar um cliente antes de adicionar equipamentos.</p>
                {% endif %}
            </div>

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Nome/Tipo do Equipamento *</label>
                <input type="text" name="name" id="name" placeholder="Ex: Ar Condicionado Split 12000 BTUs" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="brand" class="block text-sm font-medium text-gray-700">Marca</label>
                    <input type="text" name="brand" id="brand" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                </div>
                <div>
                    <label for="model" class="block text-sm font-medium text-gray-700">Modelo</label>
                    <input type="text" name="model" id="model" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="serial_number" class="block text-sm font-medium text-gray-700">Número de Série (Código de Barras)</label>
                    <div class="flex">
                        <input type="text" name="serial_number" id="serial_number" class="mt-1 block w-full border border-gray-300 rounded-l-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                        <button type="button" onclick="startScanner()" class="mt-1 inline-flex items-center px-3 rounded-r-md border border-l-0 border-gray-300 bg-gray-50 text-gray-500 hover:bg-gray-100" title="Ler Código de Barras">
                            <i class="fas fa-barcode"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="location" class="block text-sm font-medium text-gray-700">Localização no Cliente</label>
                    <input type="text" name="location" id="location" placeholder="Ex: Sala de Estar, Quarto 1" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                </div>
            </div>

            <div id="reader-container" class="hidden mt-4 border border-gray-300 p-2 rounded">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-bold">Leitor de Código de Barras</span>
                    <button type="button" onclick="stopScanner()" class="text-red-500 hover:text-red-700">
                        <i class="fas fa-times"></i> Fechar
                    </button>
                </div>
                <div id="reader" width="100%"></div>
            </div>

            <div class="flex justify-end mt-4">
                <a href="{{ url_for('equipment.index') }}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary mr-3">
                    Cancelar
                </a>
                <button type="submit" class="bg-primary border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-white hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" {% if not clients %}disabled{% endif %}>
                    Salvar Equipamento
                </button>
            </div>
        </div>
    </form>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
    let html5QrcodeScanner = null;

    function startScanner() {
        document.getElementById('reader-container').classList.remove('hidden');

        if (!html5QrcodeScanner) {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: {width: 250, height: 250} },
                /* verbose= */ false);

            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }
    }

    function stopScanner() {
        document.getElementById('reader-container').classList.add('hidden');
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        // Handle the scanned code
        document.getElementById('serial_number').value = decodedText;
        // Stop scanning
        stopScanner();
        // Play a small beep (optional)
        const audio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
        audio.play().catch(e => console.log('Audio error:', e));
    }

    function onScanFailure(error) {
        // handle scan failure, usually better to ignore and keep scanning.
    }
</script>
{% endblock %}
