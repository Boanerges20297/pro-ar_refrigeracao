{% extends "base.html" %}
{% block title %}Novo Agendamento{% endblock %}
{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Criar Agendamento de Manutenção</h2>
    <p class="text-gray-600 text-sm mt-1">Adicione um novo agendamento de manutenção preventiva</p>
</div>

<div class="bg-white shadow rounded-lg max-w-2xl mx-auto p-4 sm:p-6 border border-gray-100">
    <form method="POST" action="{{ url_for('maintenance.add') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="space-y-6">

            <!-- Equipamento -->
            <div>
                <label for="equipment_id" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Equipamento (Máquina) *</label>
                <div class="relative">
                    <select name="equipment_id" id="equipment_id" required class="w-full">
                        <option value="">Selecione o equipamento...</option>
                        {% for equip in equipments %}
                            <option value="{{ equip.id }}">{{ equip.name }} - S/N: {{ equip.serial_number or 'N/A' }} (Cliente: {{ equip.owner.name }})</option>
                        {% endfor %}
                    </select>
                </div>
                {% if not equipments %}
                <p class="text-xs text-red-500 mt-2">⚠️ Você precisa cadastrar um equipamento primeiro.</p>
                {% endif %}
            </div>

            <!-- Data da Próxima Manutenção -->
            <div>
                <label for="next_maintenance_date" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Data da Próxima Manutenção *</label>
                <input type="date" name="next_maintenance_date" id="next_maintenance_date" required class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary text-sm">
            </div>

            <!-- Observações -->
            <div>
                <label for="description" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Observações (Opcional)</label>
                <textarea id="description" name="description" rows="4" placeholder="Digite informações adicionais sobre a manutenção..." class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary text-sm"></textarea>
            </div>

            <!-- Botões -->
            <div class="flex flex-col-reverse sm:flex-row gap-3 justify-end pt-4 border-t border-gray-100">
                <a href="{{ url_for('maintenance.index') }}" class="w-full sm:w-auto bg-white border border-gray-300 hover:bg-gray-50 rounded-md shadow-sm py-2 px-4 text-center text-sm font-medium text-gray-700 transition-all">
                    Cancelar
                </a>
                <button type="submit" class="w-full sm:w-auto bg-primary hover:opacity-90 border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center items-center text-sm font-medium text-white transition-all" {% if not equipments %}disabled title="Cadastre um equipamento primeiro"{% endif %}>
                    <i class="fas fa-plus mr-2"></i>Agendar Manutenção
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize SlimSelect for Equipment
        new SlimSelect({
            select: '#equipment_id',
            settings: {
                placeholderText: 'Buscar equipamento...',
                searchText: 'Nenhum equipamento encontrado',
                searchPlaceholder: 'Digite nome, série ou cliente...'
            }
        });

        // Set default date to today
        const dateInput = document.getElementById('next_maintenance_date');
        if (dateInput) {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
        }
    });
</script>
{% endblock %}
