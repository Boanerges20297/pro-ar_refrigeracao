<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ message_subject }}</title>
</head>
<body style="margin:0;padding:24px;background:#f3f4f6;font-family:Arial,sans-serif;color:#111827;">
    <div style="max-width:640px;margin:0 auto;background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
        <div style="padding:24px 28px;background:#111827;color:#ffffff;">
            <p style="margin:0 0 8px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.75;">Comunicado interno</p>
            <h1 style="margin:0;font-size:24px;line-height:1.3;">{{ message_subject }}</h1>
        </div>
        <div style="padding:28px;">
            <p style="margin:0 0 16px;font-size:15px;line-height:1.6;">Olá, {{ recipient.name }}.</p>
            <div style="font-size:15px;line-height:1.7;color:#374151;">
                {{ message_body | replace('\n', '<br>') | safe }}
            </div>
            <div style="margin-top:24px;padding-top:18px;border-top:1px solid #e5e7eb;font-size:14px;color:#6b7280;">
                <p style="margin:0 0 6px;">Mensagem enviada por {{ sender_name }}.</p>
                <p style="margin:0;">Este e-mail foi gerado pela plataforma Pronto Ar Refrigeração.</p>
            </div>
        </div>
    </div>
</body>
</html>
