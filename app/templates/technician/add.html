{% extends "base.html" %}
{% block title %}Novo Usuário{% endblock %}
{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Adicionar Usuário</h2>
</div>

<div class="bg-white shadow overflow-hidden sm:rounded-lg max-w-2xl mx-auto p-6">
    <form method="POST" action="{{ url_for('tech.add_technician') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="grid grid-cols-1 gap-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Nome Completo *</label>
                <input type="text" name="name" id="name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">E-mail (Login) *</label>
                <input type="email" name="email" id="email" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Senha Inicial *</label>
                <input type="password" name="password" id="password" required
                       pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$"
                       title="A senha deve ter no mínimo 8 caracteres, incluindo letras e números"
                       class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                <p class="text-xs text-gray-500 mt-1">Mínimo 8 caracteres (letras e números).</p>
            </div>

            <div>
                <label for="permission_level" class="block text-sm font-medium text-gray-700">Nível de Permissão *</label>
                <select name="permission_level" id="permission_level" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    <option value="user">Técnico (Sem acesso ao admin)</option>
                    <option value="secretary">Secretária (Acesso administrativo limitado)</option>
                    <option value="admin">Administrador (Acesso completo)</option>
                    <option value="client">Cliente (Acesso apenas aos próprios dados)</option>
                </select>
            </div>

            <div id="client_selection_group" style="display: none;">
                <label for="client_id" class="block text-sm font-medium text-gray-700">Empresa Vinculada *</label>
                <select name="client_id" id="client_id" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    <option value="">-- Selecione o Cliente --</option>
                    {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="job_title" class="block text-sm font-medium text-gray-700">Função *</label>
                <select name="job_title" id="job_title" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" onchange="toggleOtherJobTitle()">
                    <option value="Técnico">Técnico</option>
                    <option value="Recepcionista">Recepcionista</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Outros">Outros...</option>
                </select>
            </div>
            
            <div id="other_job_title_group" style="display: none;">
                <label for="other_job_title" class="block text-sm font-medium text-gray-700">Qual Função?</label>
                <input type="text" name="other_job_title" id="other_job_title" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
            </div>

            <div>
                <label for="specialty" class="block text-sm font-medium text-gray-700">Especialidade (Opcional - p/ Técnicos)</label>
                <input type="text" name="specialty" id="specialty" placeholder="Ex: Refrigeração, Elétrica" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
            </div>

            <div class="flex items-center mt-2">
                <input id="is_active" name="is_active" type="checkbox" checked class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                <label for="is_active" class="ml-2 block text-sm text-gray-900">
                    Ativo (Permite acesso ao sistema)
                </label>
            </div>

            <div class="flex items-center mt-2">
                <input id="must_change_password" name="must_change_password" type="checkbox" checked class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                <label for="must_change_password" class="ml-2 block text-sm text-gray-900">
                    Exigir mudança de senha no primeiro acesso
                </label>
            </div>

            <div class="flex justify-end mt-4">
                <a href="{{ url_for('tech.list_technicians') }}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary mr-3">
                    Cancelar
                </a>
                <button type="submit" class="bg-primary border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-white hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                    Salvar Usuário
                </button>
            </div>
        </div>
    </form>
</div>
<script>
function toggleOtherJobTitle() {
    var select = document.getElementById("job_title");
    var group = document.getElementById("other_job_title_group");
    if (select.value === "Outros") {
        group.style.display = "block";
    } else {
        group.style.display = "none";
    }
}

document.getElementById("permission_level").addEventListener("change", function() {
    var clientGroup = document.getElementById("client_selection_group");
    var jobTitleGroup = document.getElementById("job_title").closest('div');
    var specialtyGroup = document.getElementById("specialty").closest('div');
    
    if (this.value === "client") {
        clientGroup.style.display = "block";
        document.getElementById("client_id").required = true;
        // Hide technical fields
        jobTitleGroup.style.display = "none";
        specialtyGroup.style.display = "none";
    } else {
        clientGroup.style.display = "none";
        document.getElementById("client_id").required = false;
        jobTitleGroup.style.display = "block";
        specialtyGroup.style.display = "block";
    }
});
</script>
{% endblock %}
